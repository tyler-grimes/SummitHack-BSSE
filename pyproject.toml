[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "ANN", # flake8-annotations (type hints)
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific rules
]
ignore = [
    "S101",   # assert allowed in tests
    "ANN101", # self needs no annotation
    "ANN102", # cls needs no annotation
]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["S", "ANN", "E501"]
"*/test_*.py" = ["S", "ANN", "E501"]
"src/config.py" = ["S105"]
"*/config.py" = ["S105", "S108"]
"src/fetchers/ercot.py" = ["S105", "E501"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_any_generics = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["src.main"]
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = [
    "pandas.*",
    "asyncpg.*",
    "xgboost.*",
    "sklearn.*",
    "lightgbm.*",
    "kafka.*",
    "redis.*",
    "cvxpy.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"
