[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_any_generics = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["src.main"]
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = ["src.solver"]
ignore_errors = true
